{{template "header" .}}
<div class="spellcheck-page">
  <h2>{{t "Spellcheck" "Spellcheck"}}</h2>
  <p class="help-text">{{t "SpellcheckIntro" "Test text against the active dictionary and rules. Each line is checked as a separate paragraph or headline."}}</p>
  <form
    class="spellcheck-form"
    hx-post="/spellcheck/_check"
    hx-target="#spellcheck-results"
    hx-disabled-elt="find button[type='submit']"
  >
    <div class="form-group">
      <label for="sc-language">{{t "Language" "Language"}}</label>
      <select id="sc-language" name="language">
        {{range .Contents.Languages}}
        <option value="{{.}}" {{if eq . $.Contents.Language}}selected{{end}}>{{.}}</option>
        {{end}}
      </select>
    </div>

    <div class="form-group">
      <label for="sc-text">{{t "SpellcheckText" "Text"}}</label>
      <textarea id="sc-text" name="text" rows="8" spellcheck="false" autocorrect="off" autocapitalize="off" placeholder="{{t "SpellcheckPlaceholder" "Mellan 12-15 personer deltog."}}">{{.Contents.Input}}</textarea>
    </div>

    <div class="form-group spellcheck-options">
      <label class="checkbox-label">
        <input type="checkbox" name="suggestions" {{if .Contents.Suggestions}}checked{{end}}>
        {{t "SpellcheckSuggestions" "Include suggestions"}}
      </label>
      <label class="checkbox-label">
        <input type="checkbox" name="custom_only" {{if .Contents.CustomOnly}}checked{{end}}>
        {{t "SpellcheckCustomOnly" "Custom dictionary and rules only (skip hunspell)"}}
      </label>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">{{t "Check" "Check"}}</button>
    </div>
  </form>

  <div id="spellcheck-results" class="spellcheck-results">
    {{template "spellcheck_result.html" .}}
  </div>
</div>
{{template "footer" .}}
